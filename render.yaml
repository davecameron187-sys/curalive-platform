  - type: web
    name: curalive-ai-core
    runtime: python
    plan: starter
    branch: RenderMigration
    rootDir: curalive_ai_core
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: PORT
        value: 10000
