services:
  - type: web
    name: curalive-node
    runtime: node
    plan: starter
    branch: RenderMigration
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: curalive-postgres
          property: connectionString
      - key: PYTHON_AI_CORE_URL
        fromService:
          name: curalive-ai-core
          type: web
          property: hostport
      - key: OPENAI_API_KEY
        sync: false
      - key: ABLY_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY
        sync: false
      - key: TWILIO_API_SECRET
        sync: false
      - key: TWILIO_CALLER_ID
        sync: false
      - key: TELNYX_API_KEY
        sync: false
      - key: TELNYX_CALLER_ID
        sync: false
      - key: TELNYX_CONNECTION_ID
        sync: false
      - key: TELNYX_SIP_CONNECTION_ID
        sync: false
      - key: RECALL_AI_API_KEY
        sync: false
      - key: RECALL_AI_BASE_URL
        sync: false
      - key: RECALL_AI_WEBHOOK_SECRET
        sync: false
      - key: RECALL_WEBHOOK_BASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: AUTH_BYPASS
        sync: false
      - key: APP_ORIGIN
        sync: false
      - key: MUX_TOKEN_ID
        sync: false
      - key: MUX_TOKEN_SECRET
        sync: false
      - key: MUX_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: curalive-ai-core
    runtime: python
    plan: starter
    branch: RenderMigration
    rootDir: curalive_ai_core
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000

databases:
  - name: curalive-postgres
    plan: basic-256mb
    diskSizeGB: 15
