<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuraLive Bookings - Event Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.3);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: rgba(96, 165, 250, 0.2);
            border-color: #60a5fa;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .section {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .section h2 {
            font-size: 18px;
            color: #60a5fa;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="datetime-local"],
        select,
        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="datetime-local"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #60a5fa;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }

        .btn {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(96, 165, 250, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .event-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .event-card:hover {
            border-color: #60a5fa;
            background: rgba(15, 23, 42, 0.7);
        }

        .event-card h3 {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .event-card p {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status.scheduled {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .status.completed {
            background: rgba(96, 165, 250, 0.2);
            color: #bfdbfe;
        }

        .action-links {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .action-link {
            color: #60a5fa;
            text-decoration: none;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid rgba(96, 165, 250, 0.3);
            padding: 4px 8px;
            border-radius: 3px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .action-link:hover {
            background: rgba(96, 165, 250, 0.1);
            border-color: #60a5fa;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            font-size: 13px;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            padding: 30px 20px;
            font-size: 13px;
        }

        .success-message {
            display: none;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.5;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                text-align: center;
            }

            .nav-buttons {
                width: 100%;
                justify-content: center;
            }

            .checkbox-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 Bookings - Event Management</h1>
            <div class="nav-buttons">
                <a href="operational-testing-v2.html" class="nav-btn">← Back</a>
                <a href="testing-registrations.html" class="nav-btn">Registrations →</a>
            </div>
        </header>

        <div class="content">
            <div class="section">
                <h2>📝 Create New Event</h2>
                <div class="success-message" id="successMsg">✓ Event created successfully! Proceed to Registrations.</div>
                
                <form onsubmit="createEvent(event)">
                    <div class="form-group">
                        <label>Event Name *</label>
                        <input type="text" id="eventName" placeholder="e.g., Q4 2025 Earnings Call" required>
                    </div>

                    <div class="form-group">
                        <label>Event Type *</label>
                        <select id="eventType" required onchange="validateEventType()">
                            <option value="" disabled selected>Select type...</option>
                            <option value="audio">🔊 Audio Conference (Phone)</option>
                            <option value="video">🎥 Video Conference (Zoom/Teams/Webex)</option>
                            <option value="webcast">📡 Webcast (Live Streaming)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date & Time *</label>
                        <input type="datetime-local" id="eventDateTime" required>
                    </div>

                    <div class="form-group">
                        <label>Expected Participants *</label>
                        <input type="number" id="participantCount" placeholder="e.g., 500" min="1" required>
                    </div>

                    <div class="form-group">
                        <label>Services to Include</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="transcription" checked>
                                <label for="transcription">Transcription</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="sentiment" checked>
                                <label for="sentiment">Sentiment</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="qa">
                                <label for="qa">Q&A</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="recording" checked>
                                <label for="recording">Recording</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" placeholder="Event description..."></textarea>
                    </div>

                    <button type="submit" class="btn">✓ Create Event</button>
                </form>
            </div>

            <!-- Audio Bridge Settings -->
            <div class="section" style="grid-column: 1 / -1;">
                <h2>🔊 Audio Bridge Settings</h2>
                <div class="success-message" id="bridgeSuccessMsg"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Bridge Provider *</label>
                        <select id="bridgeProvider">
                            <option value="">Select provider...</option>
                            <option value="Twilio">Twilio</option>
                            <option value="Telnyx">Telnyx</option>
                            <option value="Vonage">Vonage</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>API Key *</label>
                        <input type="password" id="bridgeApiKey" placeholder="Enter API key">
                    </div>
                    <div class="form-group">
                        <label>Dial-in Number *</label>
                        <input type="tel" id="dialInNumber" placeholder="+1-XXX-XXX-XXXX">
                    </div>
                </div>
                <button class="btn" onclick="configureAudioBridge()" style="margin-top: 10px;">Configure Audio Bridge</button>
            </div>

            <!-- Generate Event Materials -->
            <div class="section" style="grid-column: 1 / -1;">
                <h2>📄 Generate Event Materials</h2>
                <div class="success-message" id="materialsSuccessMsg"></div>
                <p style="color: #94a3b8; margin-bottom: 15px; font-size: 13px;">Generate calendar invites, email templates, QR codes, and agendas for your event.</p>
                <button class="btn" onclick="generateMaterials()">Generate Materials</button>
            </div>
            </div>

            <div class="section">
                <h2>📅 Upcoming Events</h2>
                <div id="eventsList"></div>
            </div>
        </div>
    </div>

    <script>
        function validateEventType() {
            const select = document.getElementById('eventType');
            const form = select.closest('form');
            if (select.value === '') {
                select.setCustomValidity('Please select an event type');
            } else {
                select.setCustomValidity('');
            }
        }

        let events = [
            {
                id: 1,
                name: "Q4 2025 Earnings Call",
                type: "audio",
                date: "2026-03-15T14:00",
                participants: 1247,
                status: "scheduled",
                services: ["Transcription", "Sentiment", "Recording"]
            },
            {
                id: 2,
                name: "Annual Investor Day",
                type: "video",
                date: "2026-03-18T10:00",
                participants: 3500,
                status: "scheduled",
                services: ["Transcription", "Sentiment", "Q&A", "Recording"]
            },
            {
                id: 3,
                name: "Board Strategy Briefing",
                type: "audio",
                date: "2026-03-22T15:00",
                participants: 24,
                status: "completed",
                services: ["Transcription", "Recording"]
            }
        ];

        function createEvent(e) {
            if (e && e.preventDefault) {
                e.preventDefault();
            }
            
            const services = [];
            if (document.getElementById('transcription').checked) services.push('Transcription');
            if (document.getElementById('sentiment').checked) services.push('Sentiment');
            if (document.getElementById('qa').checked) services.push('Q&A');
            if (document.getElementById('recording').checked) services.push('Recording');

            const newEvent = {
                id: events.length + 1,
                name: document.getElementById('eventName').value,
                type: document.getElementById('eventType').value,
                date: document.getElementById('eventDateTime').value,
                participants: parseInt(document.getElementById('participantCount').value),
                status: 'scheduled',
                services: services
            };

            events.unshift(newEvent);
            
            const msg = document.getElementById('successMsg');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 5000);

            const form = document.querySelector('form');
            if (form) {
                form.reset();
            }
            renderEvents();
        }

        function renderEvents() {
            const list = document.getElementById('eventsList');
            
            if (events.length === 0) {
                list.innerHTML = '<div class="empty-state">No events created yet</div>';
                return;
            }

            list.innerHTML = events.map(event => `
                <div class="event-card">
                    <h3>${event.name}</h3>
                    <p>📅 ${new Date(event.date).toLocaleString()}</p>
                    <p>👥 ${event.participants.toLocaleString()} participants</p>
                    <p>🎯 ${event.type === 'audio' ? '🔊 Audio' : event.type === 'video' ? '🎥 Video' : '📡 Webcast'}</p>
                    <p>📋 ${event.services.join(', ')}</p>
                    <span class="status ${event.status}">${event.status.toUpperCase()}</span>
                    <div class="action-links">
                        <a class="action-link" href="testing-registrations.html?eventId=${event.id}">Registrations →</a>
                        <a class="action-link" href="testing-occ.html?eventId=${event.id}">Load to OCC →</a>
                    </div>
                </div>
            `).join('');
        }

        renderEvents();

        // Audio Bridge Settings
        function configureAudioBridge() {
            const provider = document.getElementById('bridgeProvider').value;
            const apiKey = document.getElementById('bridgeApiKey').value;
            const dialInNumber = document.getElementById('dialInNumber').value;
            
            if (!provider || !apiKey || !dialInNumber) {
                alert('Please fill in all Audio Bridge settings');
                return;
            }
            
            const msg = document.getElementById('bridgeSuccessMsg');
            msg.textContent = `✓ Audio Bridge configured with ${provider} (Dial-in: ${dialInNumber})`;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 5000);
        }

        // Generate Event Materials
        function generateMaterials() {
            const eventName = document.getElementById('eventName').value || 'Event';
            if (!eventName) {
                alert('Please create an event first');
                return;
            }
            
            const materials = {
                calendarInvite: `${eventName}_invite.ics`,
                emailTemplate: `${eventName}_email.html`,
                qrCode: `${eventName}_qr.png`,
                agenda: `${eventName}_agenda.pdf`
            };
            
            const msg = document.getElementById('materialsSuccessMsg');
            msg.innerHTML = `✓ Materials generated:<br>${Object.values(materials).join('<br>')}`;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
