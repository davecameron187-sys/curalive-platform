<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuraLive Operational Testing - Interactive Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding: 30px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            color: #94a3b8;
            font-size: 16px;
        }

        .workflow-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .workflow-card {
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .workflow-card:hover {
            border-color: #60a5fa;
            background: rgba(30, 41, 59, 0.8);
            transform: translateY(-2px);
        }

        .workflow-card.active {
            border-color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
        }

        .workflow-card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #60a5fa;
        }

        .workflow-card p {
            font-size: 13px;
            color: #cbd5e1;
        }

        .workflow-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .workflow-content {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .phase {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        .phase:last-child {
            border-bottom: none;
        }

        .phase h2 {
            font-size: 22px;
            color: #60a5fa;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .phase-number {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .step {
            background: rgba(15, 23, 42, 0.5);
            border-left: 4px solid #60a5fa;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 6px;
        }

        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 12px;
        }

        .step h3 {
            color: #cbd5e1;
            font-size: 16px;
            flex: 1;
        }

        .step-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .action-btn {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(96, 165, 250, 0.3);
        }

        .action-btn.secondary {
            background: rgba(148, 163, 184, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .action-btn.secondary:hover {
            background: rgba(148, 163, 184, 0.2);
        }

        .step-content {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.8;
        }

        .step-content p {
            margin-bottom: 10px;
        }

        .expected-result {
            background: rgba(34, 197, 94, 0.1);
            border-left: 4px solid #22c55e;
            padding: 12px 15px;
            margin-top: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #86efac;
        }

        .deliverables-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 13px;
        }

        .deliverables-table th {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid rgba(96, 165, 250, 0.3);
        }

        .deliverables-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
        }

        .deliverables-table tr:hover {
            background: rgba(96, 165, 250, 0.05);
        }

        .checkmark {
            color: #22c55e;
            font-weight: bold;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(96, 165, 250, 0.3);
        }

        .success-criteria {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
        }

        .success-criteria h3 {
            color: #22c55e;
            margin-bottom: 15px;
        }

        .criteria-list {
            list-style: none;
        }

        .criteria-list li {
            padding: 8px 0;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .criteria-list li:before {
            content: "✓";
            color: #22c55e;
            font-weight: bold;
            font-size: 16px;
        }

        .troubleshooting {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
        }

        .troubleshooting h3 {
            color: #fb923c;
            margin-bottom: 15px;
        }

        .troubleshooting-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
        }

        .troubleshooting-item:last-child {
            border-bottom: none;
        }

        .troubleshooting-item strong {
            color: #fed7aa;
        }

        @media (max-width: 768px) {
            .workflow-selector {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 24px;
            }

            .workflow-content {
                padding: 20px;
            }

            .step-header {
                flex-direction: column;
            }

            .step-actions {
                justify-content: flex-start;
            }
        }

        @media print {
            body {
                background: white;
                color: black;
            }

            .workflow-selector,
            .action-buttons,
            .step-actions {
                display: none;
            }
        }
    </style>
</head>

        function selectWorkflow(index) {
            document.querySelectorAll('.workflow-card').forEach((card, i) => {
                card.classList.toggle('active', i === index);
            });
            renderWorkflow(index);
        }

        function renderWorkflow(index) {
            const workflow = workflows[index];
            let html = '';

            workflow.phases.forEach((phase, phaseIndex) => {
                html += `<div class="phase">
                    <h2><span class="phase-number">${phaseIndex + 1}</span>${phase.title}</h2>`;

                phase.steps.forEach((step, stepIndex) => {
                    html += `<div class="step">
                        <div class="step-header">
                            <h3>${stepIndex + 1}. ${step.title}</h3>
                            <div class="step-actions">`;

                    if (step.actions) {
                        step.actions.forEach(action => {
                            if (action.url.startsWith('http')) {
                                html += `<a href="${action.url}" target="_blank" class="action-btn">${action.label}</a>`;
                            } else {
                                html += `<button class="action-btn" onclick="navigateTo('${action.url}')">${action.label}</button>`;
                            }
                        });
                    }

                    html += `</div>
                        </div>
                        <div class="step-content">
                            <p>${step.content}</p>
                            <div class="expected-result">✓ Expected Result: ${step.result}</div>
                        </div>
                    </div>`;
                });

                html += `</div>`;
            });

            document.getElementById('workflowContent').innerHTML = html;
        }

        function navigateTo(url) {
            if (url.startsWith('/')) {
                window.location.href = url;
            } else {
                window.open(url, '_blank');
            }
        }

        function printWorkflow() {
            window.print();
        }

        // Initialize
        renderWorkflow(0);
    </script>
