<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuraLive Registrations - Participant Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; line-height: 1.6; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(148, 163, 184, 0.2); padding: 20px; border-radius: 8px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        header h1 { font-size: 24px; background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .nav-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-btn { background: rgba(96, 165, 250, 0.1); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.3); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.3s ease; text-decoration: none; display: inline-block; }
        .nav-btn:hover { background: rgba(96, 165, 250, 0.2); border-color: #60a5fa; }
        .content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .section { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 8px; padding: 25px; backdrop-filter: blur(10px); }
        .section h2 { font-size: 18px; color: #60a5fa; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #cbd5e1; font-size: 13px; font-weight: 500; }
        input, select, textarea { width: 100%; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(148, 163, 184, 0.2); color: #e2e8f0; padding: 10px 12px; border-radius: 4px; font-size: 13px; transition: all 0.3s ease; font-family: inherit; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #60a5fa; background: rgba(15, 23, 42, 0.8); box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1); }
        .btn { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(96, 165, 250, 0.3); }
        .participant-row { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 6px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .participant-info { flex: 1; }
        .participant-name { color: #cbd5e1; font-weight: 500; margin-bottom: 3px; }
        .participant-email { color: #94a3b8; }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
        .status-registered { background: rgba(34, 197, 94, 0.2); color: #86efac; }
        .status-attended { background: rgba(96, 165, 250, 0.2); color: #bfdbfe; }
        .action-btn { color: #60a5fa; cursor: pointer; border: none; background: none; font-size: 11px; text-decoration: underline; }
        .action-btn:hover { color: #93c5fd; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 6px; text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: #60a5fa; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: #94a3b8; }
        .export-btn { background: rgba(96, 165, 250, 0.1); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.3); padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.3s ease; }
        .export-btn:hover { background: rgba(96, 165, 250, 0.2); }
        @media (max-width: 768px) { .content { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👥 Registrations - Participant Management</h1>
            <div class="nav-buttons">
                <a href="testing-bookings.html" class="nav-btn">← Bookings</a>
                <a href="testing-occ.html" class="nav-btn">OCC →</a>
            </div>
        </header>

        <div class="content">
            <div class="section">
                <h2>📊 Registration Stats</h2>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalReg">1,247</div>
                        <div class="stat-label">Total Registered</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="attended">1,173</div>
                        <div class="stat-label">Attended</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="pending">74</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">94%</div>
                        <div class="stat-label">Attendance Rate</div>
                    </div>
                </div>

                <h2 style="margin-top: 20px;">📧 Add Participant</h2>
                <form onsubmit="addParticipant(event)">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="participantEmail" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="participantName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" id="participantCompany" placeholder="Acme Inc.">
                    </div>
                    <button type="submit" class="btn">+ Add Participant</button>
                </form>
            </div>

            <div class="section">
                <h2>📋 Registered Participants</h2>
                <div style="margin-bottom: 15px;">
                    <button class="export-btn" onclick="exportCSV()">📥 Export CSV</button>
                    <button class="export-btn" onclick="sendInvitations()" style="margin-left: 8px;">📧 Send Invitations</button>
                </div>
                <div id="participantsList"></div>
            </div>
        </div>
    </div>

    <script>
        let participants = [
            { id: 1, name: "Sarah Johnson", email: "sarah.j@investor.com", company: "Goldman Sachs", status: "attended" },
            { id: 2, name: "Michael Chen", email: "m.chen@venture.com", company: "Sequoia Capital", status: "attended" },
            { id: 3, name: "Emma Williams", email: "emma.w@hedge.com", company: "Bridgewater", status: "attended" },
            { id: 4, name: "David Brown", email: "d.brown@bank.com", company: "JP Morgan", status: "registered" },
            { id: 5, name: "Lisa Anderson", email: "l.anderson@fund.com", company: "Fidelity", status: "attended" }
        ];

        function addParticipant(e) {
            e.preventDefault();
            const newParticipant = {
                id: participants.length + 1,
                name: document.getElementById('participantName').value,
                email: document.getElementById('participantEmail').value,
                company: document.getElementById('participantCompany').value,
                status: 'registered'
            };
            participants.unshift(newParticipant);
            e.target.reset();
            renderParticipants();
        }

        function renderParticipants() {
            const list = document.getElementById('participantsList');
            list.innerHTML = participants.map(p => `
                <div class="participant-row">
                    <div class="participant-info">
                        <div class="participant-name">${p.name}</div>
                        <div class="participant-email">${p.email}</div>
                    </div>
                    <div style="text-align: right;">
                        <span class="status-badge status-${p.status}">${p.status.toUpperCase()}</span>
                    </div>
                </div>
            `).join('');
        }

        function exportCSV() {
            const csv = 'Name,Email,Company,Status\n' + participants.map(p => `"${p.name}","${p.email}","${p.company}","${p.status}"`).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'participants.csv';
            a.click();
        }

        function sendInvitations() {
            alert('Invitations sent to ' + participants.length + ' participants');
        }

        renderParticipants();
    </script>
</body>
</html>
