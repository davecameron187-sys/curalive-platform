<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CuraLive Shadow Mode - Live Intelligence</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.shadow-container{max-width:1400px;margin:0 auto;padding:20px}
.shadow-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(0,255,136,0.2);border-radius:12px;margin-bottom:20px}
.shadow-header h1{font-size:22px;color:#00ff88;text-shadow:0 0 20px rgba(0,255,136,0.3)}
.shadow-header .status{display:flex;align-items:center;gap:8px;font-size:13px;color:#88ffaa}
.shadow-header .status .dot{width:8px;height:8px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding:8px;background:rgba(26,26,46,0.6);border-radius:10px;border:1px solid rgba(255,255,255,0.05)}
.tab{padding:10px 18px;border-radius:8px;border:1px solid transparent;background:transparent;color:#888;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s}
.tab:hover{color:#ccc;background:rgba(255,255,255,0.05)}
.tab.active{background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(0,200,255,0.1));color:#00ff88;border-color:rgba(0,255,136,0.3);box-shadow:0 0 12px rgba(0,255,136,0.1)}
.panel{background:linear-gradient(135deg,#12121f,#1a1a2e);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:24px;min-height:500px}
.panel h2{font-size:18px;color:#00ff88;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(0,255,136,0.15)}
.panel h3{font-size:15px;color:#00ccff;margin:16px 0 10px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:16px}
.card{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:18px;transition:border-color 0.2s}
.card:hover{border-color:rgba(0,255,136,0.3)}
.card .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:6px}
.card .value{font-size:24px;font-weight:700;color:#00ff88}
.card .sub{font-size:12px;color:#888;margin-top:4px}
.btn{padding:10px 20px;border-radius:8px;border:1px solid rgba(0,255,136,0.3);background:linear-gradient(135deg,rgba(0,255,136,0.1),rgba(0,200,255,0.05));color:#00ff88;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s}
.btn:hover{background:linear-gradient(135deg,rgba(0,255,136,0.2),rgba(0,200,255,0.1));box-shadow:0 0 15px rgba(0,255,136,0.15)}
.btn-row{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#aaa;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.4);color:#e0e0e0;font-size:14px;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:rgba(0,255,136,0.4)}
.timeline{position:relative;padding-left:24px;margin-top:16px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:rgba(0,255,136,0.2)}
.timeline-item{position:relative;padding:12px 0 12px 16px;border-bottom:1px solid rgba(255,255,255,0.03)}
.timeline-item::before{content:'';position:absolute;left:-20px;top:16px;width:10px;height:10px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px rgba(0,255,136,0.4)}
.timeline-item .time{font-size:11px;color:#666}
.timeline-item .event{font-size:14px;color:#ccc;margin-top:2px}
.timeline-item .detail{font-size:12px;color:#888;margin-top:2px}
.table{width:100%;border-collapse:collapse;margin-top:12px}
.table th{text-align:left;padding:10px 14px;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:#666;border-bottom:1px solid rgba(255,255,255,0.08)}
.table td{padding:10px 14px;font-size:13px;color:#ccc;border-bottom:1px solid rgba(255,255,255,0.04)}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,255,136,0.15);color:#00ff88;border:1px solid rgba(0,255,136,0.3)}
.badge-blue{background:rgba(0,150,255,0.15);color:#00aaff;border:1px solid rgba(0,150,255,0.3)}
.badge-yellow{background:rgba(255,200,0,0.15);color:#ffcc00;border:1px solid rgba(255,200,0,0.3)}
.badge-red{background:rgba(255,80,80,0.15);color:#ff5555;border:1px solid rgba(255,80,80,0.3)}
.chat-container{max-height:400px;overflow-y:auto;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px;background:rgba(0,0,0,0.2);margin:16px 0}
.chat-msg{padding:10px 14px;margin-bottom:8px;border-radius:8px;max-width:80%}
.chat-msg.user{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.2);margin-left:auto}
.chat-msg.bot{background:rgba(0,100,255,0.1);border:1px solid rgba(0,100,255,0.2)}
.chat-msg .sender{font-size:11px;color:#888;margin-bottom:4px}
.chat-msg .text{font-size:13px;color:#ddd}
.chat-input{display:flex;gap:8px;margin-top:12px}
.chat-input input{flex:1}
.meter{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-top:6px}
.meter-fill{height:100%;border-radius:4px;transition:width 0.5s}
.meter-green .meter-fill{background:linear-gradient(90deg,#00ff88,#00cc66)}
.meter-blue .meter-fill{background:linear-gradient(90deg,#00aaff,#0066ff)}
.meter-yellow .meter-fill{background:linear-gradient(90deg,#ffcc00,#ff9900)}
.section{margin-bottom:24px}
.empty-state{text-align:center;padding:60px 20px;color:#555}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.alert{padding:14px 18px;border-radius:8px;margin-bottom:12px;font-size:13px}
.alert-info{background:rgba(0,150,255,0.1);border:1px solid rgba(0,150,255,0.2);color:#88ccff}
.alert-success{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.2);color:#88ffaa}
.alert-warn{background:rgba(255,200,0,0.1);border:1px solid rgba(255,200,0,0.2);color:#ffdd66}
</style>
</head>

function AIAdvisoryTab() {
  const [messages, setMessages] = useState([
    { sender: "bot", text: "Welcome to CuraLive AI Advisory. I can help you analyze earnings calls, identify market trends, and provide investment intelligence. What would you like to explore?" },
    { sender: "user", text: "What are the key takeaways from today's Pfizer earnings call?" },
    { sender: "bot", text: "Based on real-time analysis of the Pfizer Q4 2025 earnings call:\n\n1. Revenue beat consensus by 2.7% ($15.2B vs $14.8B expected)\n2. CEO signaled potential M&A in oncology — used 'transformative acquisition' language\n3. Three Phase III readouts expected in H1 2026\n4. FY2026 guidance raised by $500M at midpoint\n5. Sentiment score: 72% positive, trending upward throughout the call\n\nNotable: The CEO's tone shifted notably positive during pipeline discussion, which historically correlates with stock outperformance in the following week." },
  ]);
  const [input, setInput] = useState("");

  const sendMessage = () => {
    if (!input.trim()) return;
    setMessages(prev => [...prev, { sender: "user", text: input }]);
    const q = input;
    setInput("");
    setTimeout(() => {
      setMessages(prev => [...prev, {
        sender: "bot",
        text: `I've analyzed your question about "${q}". Based on current intelligence data, here are my findings:\n\n• Sentiment analysis indicates a cautiously optimistic market outlook\n• Key risk factors include regulatory timeline uncertainty\n• Recommendation: Monitor upcoming catalysts closely\n\nWould you like me to dive deeper into any specific aspect?`
      }]);
    }, 1000);
  };

  return (
    <div>
      <h2>💬 AI Advisory Bot</h2>
      <div className="chat-container">
        {messages.map((m,i) => (
          <div className={`chat-msg ${m.sender}`} key={i}>
            <div className="sender">{m.sender === "bot" ? "🤖 CuraLive AI" : "👤 You"}</div>
            <div className="text" style={{whiteSpace:"pre-wrap"}}>{m.text}</div>
          </div>
        ))}
      </div>
      <div className="chat-input">
        <input
          className="form-group"
          style={{margin:0}}
          placeholder="Ask about any company, earnings call, or market trend..."
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && sendMessage()}
        />
        <button className="btn" onClick={sendMessage}>Send</button>
      </div>
    </div>
  );
}

    { id: 2, question: "Can you elaborate on the margin expansion drivers?", asker: "Analyst - Morgan Stanley", votes: 18, status: "pending", answer: "" },
    { id: 3, question: "What's the updated patent cliff exposure estimate?", asker: "Analyst - JP Morgan", votes: 15, status: "answered", answer: "CFO confirmed $8B revenue at risk through 2028, offset by biosimilar partnerships." },
    { id: 4, question: "How does the mRNA platform apply to oncology?", asker: "Analyst - Barclays", votes: 12, status: "pending", answer: "" },
  ]);

  return (
    <div>
      <h2>❓ Live Q&A</h2>
      <div className="alert alert-info">{questions.filter(q => q.status === "pending").length} questions pending • {questions.filter(q => q.status === "answered").length} answered</div>
      <div className="btn-row">
        <button className="btn">Submit Question</button>
        <button className="btn">Export Q&A Log</button>
      </div>
      {questions.map(q => (
        <div className="card" key={q.id} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{color:"#fff",fontSize:14,fontWeight:500,marginBottom:4}}>{q.question}</div>
              <div style={{fontSize:12,color:"#888"}}>{q.asker}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:13,color:"#00ccff"}}>▲ {q.votes}</span>
              <span className={`badge ${q.status === "answered" ? "badge-green" : "badge-yellow"}`}>{q.status}</span>
            </div>
          </div>
          {q.answer && (
            <div style={{marginTop:8,padding:10,background:"rgba(0,255,136,0.05)",borderRadius:6,fontSize:13,color:"#aaa",borderLeft:"3px solid rgba(0,255,136,0.3)"}}>
              {q.answer}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function SystemTestTab() {
  const [results, setResults] = useState(null);
  const [testing, setTesting] = useState(false);

  const runTests = () => {
    setTesting(true);
    setTimeout(() => {
      setResults([
        { test: "React Rendering", status: "pass", time: "2ms" },
        { test: "Component Mount", status: "pass", time: "5ms" },
        { test: "State Management", status: "pass", time: "1ms" },
        { test: "Tab Navigation", status: "pass", time: "3ms" },
        { test: "API Connectivity", status: "skip", time: "—", note: "tRPC not connected in standalone mode" },
        { test: "WebSocket Connection", status: "skip", time: "—", note: "Ably not configured in standalone mode" },
        { test: "CSS Rendering", status: "pass", time: "1ms" },
        { test: "Event Handlers", status: "pass", time: "2ms" },
      ]);
      setTesting(false);
    }, 1500);
  };

  return (
    <div>
      <h2>⚙️ System Test</h2>
      <div className="alert alert-info">Run diagnostics to verify Shadow Mode components are functioning correctly.</div>
      <div className="btn-row">
        <button className="btn" onClick={runTests} disabled={testing}>
          {testing ? "Running Tests..." : "Run All Tests"}
        </button>
      </div>
      {results && (
        <table className="table">
          <thead><tr><th>Test</th><th>Status</th><th>Time</th><th>Notes</th></tr></thead>
          <tbody>
            {results.map((r,i) => (
              <tr key={i}>
                <td>{r.test}</td>
                <td>
                  <span className={`badge ${r.status === "pass" ? "badge-green" : r.status === "fail" ? "badge-red" : "badge-yellow"}`}>
                    {r.status === "pass" ? "✓ PASS" : r.status === "fail" ? "✗ FAIL" : "⊘ SKIP"}
                  </span>
                </td>
                <td>{r.time}</td>
                <td style={{fontSize:12,color:"#888"}}>{r.note || ""}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
      {!results && !testing && (
        <div className="empty-state">
          <div className="icon">🔬</div>
          <p>Click "Run All Tests" to verify system components</p>
        </div>
      )}
    </div>
  );
}

const TAB_COMPONENTS = {
  "live": LiveIntelligenceTab,
  "archive-upload": ArchiveUploadTab,
  "archives": ArchivesReportsTab,
  "ai-dashboard": AIDashboardTab,
  "ai-learning": AILearningTab,
  "ai-advisory": AIAdvisoryTab,
  "live-qa": LiveQATab,
  "system": SystemTestTab,
};

function ShadowMode() {
  const [activeTab, setActiveTab] = useState("live");
  const ActiveComponent = TAB_COMPONENTS[activeTab];

  return (
    <div className="shadow-container">
      <div className="shadow-header">
        <h1>Shadow Mode — Live Intelligence</h1>
        <div className="status">
          <div className="dot"></div>
          System Active • {new Date().toLocaleTimeString()}
        </div>
      </div>
      <div className="tabs">
        {TABS.map(t => (
          <button key={t.id} className={`tab ${activeTab === t.id ? "active" : ""}`} onClick={() => setActiveTab(t.id)}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>
      <div className="panel">
        <ActiveComponent />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ShadowMode />);
</script>
</body>
</html>
