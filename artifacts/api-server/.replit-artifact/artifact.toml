kind = "web"
previewPath = "/"
title = "CuraLive Platform"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[services]]
localPort = 3000
name = "CuraLive Server"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = "cd /home/runner/workspace && cp dist/_app/_index.html dist/_app/index.html && echo 'Build complete - index.html prepared'"
run = "cd /home/runner/workspace && NODE_ENV=production node dist/index.js"

[services.env]
PORT = "3000"
