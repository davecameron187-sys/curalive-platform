kind = "api"
previewPath = "/"
title = "CuraLive Platform"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[services]]
localPort = 3000
name = "CuraLive Server"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = "pnpm --filter @workspace/api-server run build"
run = "pnpm --filter @workspace/api-server run start"

[services.env]
PORT = "3000"
