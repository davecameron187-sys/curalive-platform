kind = "web"
previewPath = "/"
title = "CuraLive Platform"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[services]]
localPort = 5001
name = "CuraLive Server"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
run = "cd /home/runner/workspace && NODE_ENV=production PORT=5001 node _build/index.js"

[services.env]
PORT = "5001"
