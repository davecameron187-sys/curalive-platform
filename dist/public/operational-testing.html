<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuraLive Operational Testing - End-to-End Workflows</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding: 30px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            color: #94a3b8;
            font-size: 16px;
        }

        .workflow-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .workflow-card {
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .workflow-card:hover {
            border-color: #60a5fa;
            background: rgba(30, 41, 59, 0.8);
            transform: translateY(-2px);
        }

        .workflow-card.active {
            border-color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
        }

        .workflow-card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #60a5fa;
        }

        .workflow-card p {
            font-size: 13px;
            color: #cbd5e1;
        }

        .workflow-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .workflow-content {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .phase {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        .phase:last-child {
            border-bottom: none;
        }

        .phase h2 {
            font-size: 22px;
            color: #60a5fa;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .phase-number {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .step {
            background: rgba(15, 23, 42, 0.5);
            border-left: 4px solid #60a5fa;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 6px;
        }

        .step h3 {
            color: #cbd5e1;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .step-content {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.8;
        }

        .step-content p {
            margin-bottom: 10px;
        }

        .step-list {
            margin: 10px 0;
            padding-left: 20px;
        }

        .step-list li {
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .expected-result {
            background: rgba(34, 197, 94, 0.1);
            border-left: 4px solid #22c55e;
            padding: 12px 15px;
            margin-top: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #86efac;
        }

        .deliverables-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 13px;
        }

        .deliverables-table th {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid rgba(96, 165, 250, 0.3);
        }

        .deliverables-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
        }

        .deliverables-table tr:hover {
            background: rgba(96, 165, 250, 0.05);
        }

        .checkmark {
            color: #22c55e;
            font-weight: bold;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(96, 165, 250, 0.3);
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.2);
        }

        .success-criteria {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
        }

        .success-criteria h3 {
            color: #22c55e;
            margin-bottom: 15px;
        }

        .criteria-list {
            list-style: none;
        }

        .criteria-list li {
            padding: 8px 0;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .criteria-list li:before {
            content: "✓";
            color: #22c55e;
            font-weight: bold;
            font-size: 16px;
        }

        .troubleshooting {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
        }

        .troubleshooting h3 {
            color: #fb923c;
            margin-bottom: 15px;
        }

        .troubleshooting-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
        }

        .troubleshooting-item:last-child {
            border-bottom: none;
        }

        .troubleshooting-item strong {
            color: #fed7aa;
        }

        @media (max-width: 768px) {
            .workflow-selector {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 24px;
            }

            .workflow-content {
                padding: 20px;
            }
        }

        .print-button {
            margin-top: 20px;
        }

        @media print {
            body {
                background: white;
                color: black;
            }

            .workflow-selector,
            .action-buttons {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎚️ CuraLive Operational Testing</h1>
            <p>Complete End-to-End Workflow Testing: Booking → Registrations → Live Event → Post-Event Delivery</p>
        </header>

        <div class="workflow-selector">
            <div class="workflow-card active" onclick="selectWorkflow(0)">
                <div class="workflow-icon">🔊</div>
                <h3>Audio Conference</h3>
                <p>Phone dial-in with transcription & sentiment</p>
            </div>
            <div class="workflow-card" onclick="selectWorkflow(1)">
                <div class="workflow-icon">🎥</div>
                <h3>Video Conference</h3>
                <p>Zoom, Teams, or Webex integration</p>
            </div>
            <div class="workflow-card" onclick="selectWorkflow(2)">
                <div class="workflow-icon">📡</div>
                <h3>Webcast</h3>
                <p>Live streaming to public audience</p>
            </div>
        </div>

        <div class="workflow-content" id="workflowContent">
            <!-- Content will be populated by JavaScript -->
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="printWorkflow()">🖨️ Print Guide</button>
            <button class="btn btn-secondary" onclick="downloadMarkdown()">📥 Download as Markdown</button>
        </div>
    </div>

    <script>
        const workflows = [
            {
                name: "Audio Conference Call",
                icon: "🔊",
                phases: [
                    {
                        title: "Book the Event",
                        steps: [
                            {
                                title: "Create Event in Booking System",
                                content: "Navigate to the Bookings module and create a new event with details: Event Name, Type (Audio Conference), Date & Time, Expected Participants, and Services (Transcription, Sentiment, Q&A).",
                                result: "Event appears in calendar view with status 'Scheduled'"
                            },
                            {
                                title: "Configure Audio Bridge",
                                content: "Select Audio Bridge option, choose platform (Twilio + Telnyx), set dial-in number and PIN, enable recording.",
                                result: "Dial-in number and PIN are displayed and ready to share"
                            },
                            {
                                title: "Generate Event Materials",
                                content: "Generate calendar invite, email template with dial-in details, and QR code for participants.",
                                result: "All materials are ready for distribution"
                            }
                        ]
                    },
                    {
                        title: "Manage Registrations",
                        steps: [
                            {
                                title: "Add Participants",
                                content: "Upload CSV with participant data (email, name, company, role) or add manually.",
                                result: "Participants appear in registration list with status 'Invited'"
                            },
                            {
                                title: "Send Invitations",
                                content: "Send invitations with event details, dial-in number, PIN, and calendar invite.",
                                result: "Email delivery status shows 'Sent' for each participant"
                            },
                            {
                                title: "Monitor Registration Status",
                                content: "Track participant status: Invited → Registered → Attended. Filter by status to see who has responded.",
                                result: "Registration statuses update as participants respond"
                            },
                            {
                                title: "Export Registration Report",
                                content: "Export participant data in CSV or Excel format with all relevant fields.",
                                result: "File downloads with all participant data"
                            }
                        ]
                    },
                    {
                        title: "Run Live Event",
                        steps: [
                            {
                                title: "Load Event into OCC",
                                content: "Navigate to OCC, select the event, and load it with all configurations (participants, dial-in, recording, transcription).",
                                result: "Event is fully loaded in OCC with all settings applied"
                            },
                            {
                                title: "Pre-Event Verification",
                                content: "Verify dial-in number, PIN, recording enabled, transcription ready, sentiment analysis ready, Q&A moderation ready.",
                                result: "All systems show 'Ready' status"
                            },
                            {
                                title: "Start Event",
                                content: "Click 'Start Event' button. System transitions to LIVE status, dial-in bridge becomes active, recording starts, transcription begins.",
                                result: "Event status shows 'LIVE' with red indicator"
                            },
                            {
                                title: "Participants Call In",
                                content: "Have test participants call the dial-in number and enter PIN. Participants appear in OCC as they join.",
                                result: "Participant count increases as each person joins"
                            },
                            {
                                title: "Monitor Live Transcription",
                                content: "As participants speak, verify transcription appears in real-time (<2 seconds latency) with speaker identification.",
                                result: "Live transcription updates continuously with accurate speaker names"
                            },
                            {
                                title: "Monitor Sentiment Analysis",
                                content: "Watch sentiment scores update for each speaker. Verify sentiment matches actual tone (Positive/Neutral/Negative).",
                                result: "Sentiment scores appear for each speaker segment"
                            },
                            {
                                title: "Test Q&A Moderation",
                                content: "Have participants submit questions. Operator approves/rejects questions. Approved questions visible to all.",
                                result: "Q&A workflow functions correctly"
                            },
                            {
                                title: "End Event",
                                content: "Click 'End Event' button. System stops recording, completes transcription, changes status to 'Completed'.",
                                result: "Event transitions to completed state"
                            }
                        ]
                    },
                    {
                        title: "Post-Event Delivery",
                        steps: [
                            {
                                title: "Access Post-Event Dashboard",
                                content: "View event summary, transcription, sentiment analysis, Q&A summary, and recording status.",
                                result: "All post-event data is available"
                            },
                            {
                                title: "Generate AI Summary",
                                content: "System processes transcription through LLM to generate executive summary, topic extraction, sentiment trends, and key quotes.",
                                result: "AI summary appears within 30-60 seconds"
                            },
                            {
                                title: "Download Transcription",
                                content: "Choose format (TXT, PDF, VTT, SRT, JSON) and download. Verify format contains speaker names and timestamps.",
                                result: "Transcription file downloads in selected format"
                            },
                            {
                                title: "Download Recording",
                                content: "Choose format (MP3, WAV, M4A) and quality (High/Medium/Low). Download and verify playback.",
                                result: "Recording file downloads and plays correctly"
                            },
                            {
                                title: "Generate Compliance Report",
                                content: "System scans transcript for regulatory language, prohibited statements, and risk indicators. Report shows compliance score and flagged items.",
                                result: "Compliance report is generated with flagged items"
                            },
                            {
                                title: "Generate Analytics Report",
                                content: "Report includes participation metrics, engagement stats, topic analysis, Q&A analytics, and sentiment trends.",
                                result: "Comprehensive analytics report is generated"
                            },
                            {
                                title: "Configure Automatic Delivery",
                                content: "Set rules for auto-sending transcription, recording, summary, compliance report, and analytics. Choose delivery timing and method.",
                                result: "Delivery rules are saved"
                            },
                            {
                                title: "Manual Delivery to Customer",
                                content: "Select what to send (transcription, recording, AI summary, compliance report, analytics), choose recipients, add custom message, and send.",
                                result: "Email is sent with selected attachments"
                            },
                            {
                                title: "Verify Delivery",
                                content: "Check email inbox for delivery. Open each file to verify content is correct and files are accessible.",
                                result: "All files are correct and accessible"
                            }
                        ]
                    }
                ]
            },
            {
                name: "Video Conference (Zoom/Teams/Webex)",
                icon: "🎥",
                phases: [
                    {
                        title: "Book the Event",
                        steps: [
                            {
                                title: "Create Video Conference Event",
                                content: "Follow audio workflow steps 1.1-1.3, but select 'Video Conference' and choose platform (Zoom, Teams, or Webex).",
                                result: "Video conference event is booked with platform selected"
                            },
                            {
                                title: "Configure Video Settings",
                                content: "Enable recording, screen sharing, and select video quality (HD or 4K).",
                                result: "Video settings are configured"
                            }
                        ]
                    },
                    {
                        title: "Manage Registrations",
                        steps: [
                            {
                                title: "Register Participants",
                                content: "Follow audio workflow steps 2.1-2.4. Participants receive meeting link instead of dial-in number.",
                                result: "Participants are registered and invited with meeting link"
                            }
                        ]
                    },
                    {
                        title: "Run Live Event",
                        steps: [
                            {
                                title: "Load and Start Event",
                                content: "Follow audio workflow steps 3.1-3.3. Participants join via Zoom/Teams/Webex meeting link.",
                                result: "Video event is running with participants joined"
                            },
                            {
                                title: "Monitor Video & Transcription",
                                content: "Follow audio workflow steps 3.5-3.7. Transcription captures video audio. Q&A includes chat messages from video platform.",
                                result: "Video, transcription, and Q&A all functioning"
                            }
                        ]
                    },
                    {
                        title: "Post-Event Delivery",
                        steps: [
                            {
                                title: "Deliver Video Recording",
                                content: "Follow audio workflow steps 4.1-4.9. Recording includes video (MP4 format). Video can be edited before delivery.",
                                result: "Video recording is delivered to customer"
                            }
                        ]
                    }
                ]
            },
            {
                name: "Webcast (Live Streaming)",
                icon: "📡",
                phases: [
                    {
                        title: "Book the Event",
                        steps: [
                            {
                                title: "Create Webcast Event",
                                content: "Follow audio workflow steps 1.1-1.3, but select 'Webcast' option. Configure streaming platform (Mux, YouTube Live, or custom RTMP).",
                                result: "Webcast event is booked with streaming configured"
                            },
                            {
                                title: "Generate Streaming Keys",
                                content: "System generates RTMP URL and streaming key for encoder setup.",
                                result: "Streaming key and RTMP URL are ready"
                            }
                        ]
                    },
                    {
                        title: "Manage Registrations",
                        steps: [
                            {
                                title: "Register Participants",
                                content: "Follow audio workflow steps 2.1-2.4. Participants receive webcast link and can register for reminders.",
                                result: "Participants are registered and invited with webcast link"
                            }
                        ]
                    },
                    {
                        title: "Run Live Event",
                        steps: [
                            {
                                title: "Start Streaming",
                                content: "Load event in OCC, verify streaming service is ready, start event and streaming begins simultaneously.",
                                result: "Webcast streams to public audience"
                            },
                            {
                                title: "Monitor Stream Quality",
                                content: "Verify participants can join via webcast link, transcription captures audio, sentiment and Q&A work correctly.",
                                result: "Stream quality is good and all features working"
                            }
                        ]
                    },
                    {
                        title: "Post-Event Delivery",
                        steps: [
                            {
                                title: "Deliver Webcast Recording",
                                content: "Follow audio workflow steps 4.1-4.9. Recording is available as MP4 (high quality) and can be made on-demand accessible.",
                                result: "Webcast recording is delivered and accessible"
                            }
                        ]
                    }
                ]
            }
        ];

        const deliverables = [
            { name: "Transcription", audio: "✓", video: "✓", webcast: "✓", formats: "TXT, PDF, VTT, SRT, JSON" },
            { name: "Recording", audio: "✓", video: "✓", webcast: "✓", formats: "MP3, MP4, WAV, M4A" },
            { name: "AI Summary", audio: "✓", video: "✓", webcast: "✓", formats: "PDF, Text" },
            { name: "Compliance Report", audio: "✓", video: "✓", webcast: "✓", formats: "PDF, Excel" },
            { name: "Analytics Report", audio: "✓", video: "✓", webcast: "✓", formats: "PDF, Excel, PPT" },
            { name: "Participant List", audio: "✓", video: "✓", webcast: "✓", formats: "CSV, Excel" },
            { name: "Q&A Summary", audio: "✓", video: "✓", webcast: "✓", formats: "PDF, Text" }
        ];

        const successCriteria = [
            "Event created with all required details",
            "Dial-in/meeting link generated correctly",
            "Participants can be imported and invited",
            "Registration statuses update correctly",
            "Event loads into OCC without errors",
            "All participants can join successfully",
            "Transcription works in real-time (<2s latency)",
            "Sentiment analysis scores are accurate",
            "Q&A moderation functions correctly",
            "Recording captures all audio/video",
            "AI summary generates within 60 seconds",
            "All download formats work correctly",
            "Automatic delivery sends correct files",
            "Manual delivery allows custom selection"
        ];

        const troubleshooting = [
            { issue: "Participants can't join", solution: "Verify dial-in number/PIN (audio) or meeting link (video) is correct and accessible" },
            { issue: "No transcription appearing", solution: "Check transcription service status in OCC, verify audio is being captured, check microphone levels" },
            { issue: "Recording not available", solution: "Verify recording was enabled before event started, check storage space, wait 5-10 minutes for processing" },
            { issue: "AI summary not generating", solution: "Verify transcription is complete, check LLM service status, try again after 2 minutes" },
            { issue: "Delivery email not received", solution: "Check spam folder, verify email addresses are correct, check delivery logs in OCC" }
        ];

        function selectWorkflow(index) {
            document.querySelectorAll('.workflow-card').forEach((card, i) => {
                card.classList.toggle('active', i === index);
            });
            renderWorkflow(index);
        }

        function renderWorkflow(index) {
            const workflow = workflows[index];
            let html = '';

            workflow.phases.forEach((phase, phaseIndex) => {
                html += `<div class="phase">
                    <h2><span class="phase-number">${phaseIndex + 1}</span>${phase.title}</h2>`;

                phase.steps.forEach((step, stepIndex) => {
                    html += `<div class="step">
                        <h3>${stepIndex + 1}. ${step.title}</h3>
                        <div class="step-content">
                            <p>${step.content}</p>
                            <div class="expected-result">✓ Expected Result: ${step.result}</div>
                        </div>
                    </div>`;
                });

                html += `</div>`;
            });

            // Add deliverables table
            html += `<div class="phase">
                <h2><span class="phase-number">📦</span>What Gets Delivered to Customer</h2>
                <table class="deliverables-table">
                    <thead>
                        <tr>
                            <th>Deliverable</th>
                            <th>Audio</th>
                            <th>Video</th>
                            <th>Webcast</th>
                            <th>Formats</th>
                        </tr>
                    </thead>
                    <tbody>`;

            deliverables.forEach(d => {
                html += `<tr>
                    <td>${d.name}</td>
                    <td class="checkmark">${d.audio}</td>
                    <td class="checkmark">${d.video}</td>
                    <td class="checkmark">${d.webcast}</td>
                    <td>${d.formats}</td>
                </tr>`;
            });

            html += `</tbody></table></div>`;

            // Add success criteria
            html += `<div class="success-criteria">
                <h3>✓ Key Success Criteria</h3>
                <ul class="criteria-list">`;

            successCriteria.forEach(criterion => {
                html += `<li>${criterion}</li>`;
            });

            html += `</ul></div>`;

            // Add troubleshooting
            html += `<div class="troubleshooting">
                <h3>⚠️ Troubleshooting</h3>`;

            troubleshooting.forEach(item => {
                html += `<div class="troubleshooting-item">
                    <strong>Issue:</strong> ${item.issue}<br>
                    <strong>Solution:</strong> ${item.solution}
                </div>`;
            });

            html += `</div>`;

            document.getElementById('workflowContent').innerHTML = html;
        }

        function printWorkflow() {
            window.print();
        }

        function downloadMarkdown() {
            const workflow = workflows[0]; // Audio workflow
            let markdown = `# CuraLive Operational Testing Guide\n\n`;
            markdown += `## Complete End-to-End Workflow Testing\n\n`;

            workflow.phases.forEach((phase, phaseIndex) => {
                markdown += `## Phase ${phaseIndex + 1}: ${phase.title}\n\n`;

                phase.steps.forEach((step, stepIndex) => {
                    markdown += `### Step ${phaseIndex + 1}.${stepIndex + 1}: ${step.title}\n\n`;
                    markdown += `${step.content}\n\n`;
                    markdown += `**Expected Result:** ${step.result}\n\n`;
                });
            });

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/markdown;charset=utf-8,' + encodeURIComponent(markdown));
            element.setAttribute('download', 'CuraLive_Operational_Testing_Guide.md');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        // Initialize
        renderWorkflow(0);
    </script>
</body>
</html>
